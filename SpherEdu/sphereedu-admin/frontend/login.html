<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpherEdu — Super Admin · Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

<div class="login-wrapper">

  <!-- ===== PAINEL ESQUERDO — Formulário ===== -->
  <div class="left-panel">
    <div class="form-inner">

      <div class="logo-area">
        <img src="logo.png" alt="SpherEdu Logo" />
        <span class="logo-text">Spher<span>Edu</span></span>
        <span class="badge-admin">Super Admin</span>
      </div>

      <p class="subtitle">Acesso restrito ao painel administrativo</p>

      <div id="login-feedback" class="login-feedback" role="alert"></div>

      <div class="field">
        <input type="email" id="input-email" name="email"
               placeholder="E-mail de administrador" autocomplete="email" required />
        <span class="field-error-msg" id="email-error"></span>
      </div>

      <div class="field">
        <input type="password" id="input-senha" name="senha"
               placeholder="Senha" autocomplete="current-password" required />
        <span class="field-error-msg" id="senha-error"></span>
      </div>

      <a href="../../SpherEdu/emailRecuperacao/emailRecuperacao.html" class="forgot-link">
        Esqueci minha senha
      </a>

      <button id="btn-entrar" class="btn-entrar" type="button" onclick="handleLogin()">
        Entrar
      </button>

      <div class="checkbox-row">
        <input type="checkbox" id="lembrar" name="lembrar" />
        <label for="lembrar">Lembrar meu acesso</label>
      </div>

      <hr class="divider" />

      <p class="register-row">
        Acesso de aluno ou coordenador? <a href="../../SpherEdu/login/login.html">Clique aqui</a>
      </p>

    </div>
  </div>

  <div class="right-panel" role="img" aria-label="Imagem ilustrativa SpherEdu"></div>

</div>

<script src="js/login.js"></script>
</body>
</html>
